name: CI

on:
  pull_request:
  push:
    branches: [main, feature/sleep-queue]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Set up uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.8.22"

      - name: Install locked dependencies
        run: uv sync --frozen --extra dashboard --dev

      - name: Run Python tests
        run: uv run python -m unittest discover -s tests -v

      - name: Check Python lint and formatting
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run static type checks
        run: uv run mypy

      - name: Run release updater tests
        run: npm test

      - name: Check JavaScript syntax and behaviour
        run: |
          node --check dashboard/script.js
          node --check dashboard/config.js
          node --check dashboard/channels.js
          node --test tests/frontend/*.test.js

      - name: Validate lockfile
        run: uv lock --check

      - name: Scan repository for committed secrets
        run: uv run python scripts/check_repo_secrets.py

      - name: Audit locked Python dependencies
        if: matrix.python-version == '3.13'
        run: uv run pip-audit

      - name: Build package
        if: matrix.python-version == '3.13'
        run: uv build
